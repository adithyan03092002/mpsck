name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-packages: 'cython virtualenv'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libncursesw5-dev libsqlite3-dev ukwm xclip xsel libjpeg-dev openjdk-17-jdk unzip wget apktool

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | wget --quiet https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d cmdline-tools
        mkdir -p sdk/cmdline-tools
        mv cmdline-tools/cmdline-tools sdk/cmdline-tools/latest
        export ANDROID_HOME=$PWD/sdk
        yes | ./sdk/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Build with Buildozer
      run: |
        export ANDROID_HOME=$PWD/sdk
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mpsck-apk
        path: bin/*.apk
