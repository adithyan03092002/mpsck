name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libtinfo5

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools
        pip install cython==3.0.10
        pip install buildozer

    # ബിൽഡ് ചെയ്യുന്നതിന് തൊട്ടുമുൻപ് buildozer.spec ഫയലിലെ ആ പഴയ വാണിംഗും ലൈസൻസ് ഇഷ്യൂവും മാറ്റുന്നു
    - name: Configure Buildozer Spec
      run: |
        sed -i 's/android.bootstrap =/p4a.bootstrap =/g' buildozer.spec
        sed -i 's/#android.accept_apk_license = False/android.accept_apk_license = True/g' buildozer.spec
        sed -i 's/android.accept_apk_license = False/android.accept_apk_license = True/g' buildozer.spec

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
