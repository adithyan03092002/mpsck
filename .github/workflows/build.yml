name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libtinfo5 cmake clang

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools
        pip install cython==3.0.10
        pip install buildozer

    - name: Build with Buildozer
      run: |
        export ANDROID_HOME=/usr/local/share/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/tools/bin:$ANDROID_HOME/tools/bin
        export APP_ANDROID_ACCEPT_SDK_LICENSE="y"
        
        # Licenses accept ചെയ്യാൻ വേണ്ടി
        yes | sdkmanager --licenses || true
        
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: ./**/*.apk
