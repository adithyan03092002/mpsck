name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config libltdl-dev libffi-dev libssl-dev cmake

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install cython==3.0.10
          pip install buildozer

      - name: Configure Buildozer Spec
        run: |
          sed -i 's/android.bootstrap =/p4a.bootstrap =/g' buildozer.spec
          sed -i 's/#android.accept_apk_license = False/android.accept_apk_license = True/g' buildozer.spec

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
