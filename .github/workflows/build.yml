name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libtinfo5 cmake clang

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools
        pip install cython==3.0.10
        pip install buildozer

    - name: Build with Buildozer
      run: |
        # ഓട്ടോമാറ്റിക്കായി ലൈസൻസ് അക്സെപ്റ്റ് ചെയ്യാൻ ബിൽഡോസറിനോട് ആവശ്യപ്പെടുന്നു
        export APP_ANDROID_ACCEPT_SDK_LICENSE="y"
        
        # നേരിട്ട് ബിൽഡ് സ്റ്റാർട്ട് ചെയ്യുന്നു
        buildozer android debug
