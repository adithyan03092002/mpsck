name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libtinfo5 cmake clang

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools
        pip install cython==3.0.10
        pip install buildozer

    - name: Build with Buildozer
      run: |
        # ആൻഡ്രോയിഡ് ടൂളുകളുടെ ലൊക്കേഷൻ സെറ്റ് ചെയ്യുന്നു
        export ANDROID_HOME=/usr/local/share/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/tools/bin:$ANDROID_HOME/tools/bin
        
        # ലൈസൻസുകൾ ഓട്ടോമാറ്റിക് ആയി അക്സെപ്റ്റ് ചെയ്യാനുള്ള കമാൻഡ്
        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
        
        # ബിൽഡോസർ ബിൽഡ് റൺ ചെയ്യുന്നു
        buildozer android debug
