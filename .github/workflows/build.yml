name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev bzip2 libsqlite3-dev sqlite3 libgdbm-dev libdb-dev libreadline-dev libncursesw5-dev libncurses5-dev liblzma-dev lld

    - name: Install Cython and Buildozer
      run: |
        pip install --upgrade pip setuptools
        pip install Cython==3.0.10
        pip install buildozer

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
