name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev gapktool openjdk-17-jdk unzip wget
        pip install --upgrade pip
        pip install cython virtualenv buildozer

    - name: Build with Buildozer Action
      uses: ArtemGovorov/buildozer-action@v1.2.2
      id: buildozer
      with:
        command: buildozer android debug
        repository_root: .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mpsck-apk
        path: ${{ steps.buildozer.outputs.filename }}
