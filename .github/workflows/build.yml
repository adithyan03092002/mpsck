name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev libtinfo5

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip setuptools
        pip install cython==3.0.10
        pip install buildozer

    # Android SDK സെറ്റപ്പ് ചെയ്യാനും ഓട്ടോമാറ്റിക് ആയി ലൈസൻസ് ആക്സെപ്റ്റ് ചെയ്യാനും ഇത് സഹായിക്കും
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ആവശ്യമുള്ള build-tools നേരിട്ട് ഇൻസ്റ്റാൾ ചെയ്യുന്നു
    - name: Install Android Build-Tools
      run: |
        sdkmanager "build-tools;34.0.0" "platforms;android-34"
        yes | sdkmanager --licenses

    - name: Build with Buildozer
      run: |
        buildozer android debug
